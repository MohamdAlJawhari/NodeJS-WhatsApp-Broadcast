<body>

    <div class="container">

        <h1>
            WhatsApp Broadcast Sender
        </h1>

        <button id="loadContactsBtn">
            Load Contacts File
        </button>

        <p id="status">
            No file selected
        </p>

        <hr>

        <h2>
            WhatsApp Connection
        </h2>

        <button id="connectBtn">
            Connect WhatsApp
        </button>

        <p id="connectionStatus">
            Not connected
        </p>

        <img id="qrImage" style="
    max-width: 300px;
    display: none;
    margin-top: 20px;
  ">
        <h2>
            Message Template
        </h2>

        <textarea id="templateInput" rows="8" placeholder="Write your message template here..."></textarea>

        <br><br>

        <button id="previewBtn">
            Preview Messages
        </button>

        <hr>

        <h2>
            Preview
        </h2>

        <div id="previewContainer">

        </div>

    </div>

    <script src="app.js"></script>

</body>
