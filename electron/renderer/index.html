<body>

    <div class="container">

        <h1>
            WhatsApp Broadcast Sender
        </h1>

        <button id="loadContactsBtn">
            Load Contacts File
        </button>

        <p id="status">
            No file selected
        </p>

        <hr>

        <h2>
            WhatsApp Connection
        </h2>

        <button id="connectBtn">
            Connect WhatsApp
        </button>

        <p id="connectionStatus">
            Not connected
        </p>

        <img id="qrImage" style="
    max-width: 300px;
    display: none;
    margin-top: 20px;
  ">
        <h2>
            Message Template
        </h2>

        <textarea id="templateInput" rows="8" placeholder="Write your message template here..."></textarea>

        <br><br>

        <button id="saveTemplateBtn">
            Save As Default Template
        </button>

        <br><br>

        <h2>
            Media File (Optional)
        </h2>

        <button id="mediaBtn">
            Choose Media File
        </button>

        <p id="mediaStatus">
            No media selected
        </p>

        <br><br>

        <button id="previewBtn">
            Preview Messages
        </button>

        <hr>

        <h2>
            Preview
        </h2>

        <div id="previewContainer">

        </div>

        <hr>

        <h2>
            Sending
        </h2>

        <p>
            Status:
            <span id="broadcastStatus">
                IDLE
            </span>
        </p>


        <button id="startBtn">
            Start Sending
        </button>

        <button id="pauseBtn">
            Pause
        </button>

        <button id="resumeBtn">
            Resume
        </button>

        <button id="stopBtn">
            Stop
        </button>

        <div id="progressContainer" style="
    margin-top: 20px;
  ">

            <progress id="progressBar" value="0" max="100" style="
      width: 100%;
      height: 30px;
    "></progress>

            <p id="progressText">
                0%
            </p>

        </div>

        <h3>
            Live Logs
        </h3>

        <div id="logs"></div>

    </div>

    <script src="app.js"></script>

</body>
